<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SkillBarter | Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Firebase SDKs (Compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <!-- Your Firebase init (defines firebase, auth, db) -->
  <script src="js/firebase.js"></script>

  <!-- Auth functions (login, register) -->
  <script src="js/auth.js"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:"Poppins",sans-serif;
    }

    body{
      min-height:100vh;
      background:linear-gradient(135deg,#f7f8fc,#e6ebf5);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:16px;
    }

    .logo{
      font-size:32px;
      font-weight:600;
      color:#4b3cff;
    }

    .tagline{
      font-size:18px;
      color:#555;
      margin-bottom:30px;
      text-align:center;
    }

    .auth-card{
      background:white;
      width:350px;
      max-width:100%;
      border-radius:15px;
      box-shadow:0 10px 25px rgba(0,0,0,0.1);
      padding:30px 24px;
    }

    .input-group{
      margin-bottom:15px;
    }

    .input-group input{
      width:100%;
      padding:10px;
      border-radius:8px;
      border:1px solid #ccc;
      outline:none;
    }

    .submit-btn{
      width:100%;
      padding:10px;
      background:#4b3cff;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-size:15px;
      margin-top:4px;
    }

    .submit-btn.secondary{
      background:#111827;
      margin-top:8px;
    }

    .switch-text{
      margin-top:14px;
      font-size:13px;
      color:#555;
      text-align:center;
    }
  </style>
</head>
<body>

  <div class="logo">SkillBarter</div>
  <div class="tagline">Exchange Skills. Grow Together.</div>

  <div class="auth-card">
    <div class="input-group">
      <input type="email" id="email" placeholder="Email">
    </div>

    <div class="input-group">
      <input type="password" id="password" placeholder="Password">
    </div>

    <button type="button" onclick="login()" class="submit-btn" id="loginBtn">
      Login
    </button>

    <button type="button" onclick="register()" class="submit-btn secondary" id="registerBtn">
      Register
    </button>

    <div class="switch-text">
      Enter email and password, then use Login or Register.
    </div>
  </div>

</body>
</html>
