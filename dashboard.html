<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SkillBarter | Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Firebase SDKs (Compat) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script src="js/firebase.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Poppins",sans-serif;
}

/* Light theme (default) */
:root {
    --bg-color: #f7f8fc;
    --card-bg: #ffffff;
    --text-color: #555;
    --heading-color: #111827;
    --border-color: #e5e7eb;
    --shadow-soft: 0 2px 8px rgba(0,0,0,0.08);
    --header-bg: #ffffff;
}

/* Dark theme */
body.dark {
    --bg-color: #0f172a;
    --card-bg: #111827;
    --text-color: #e5e7eb;
    --heading-color: #f9fafb;
    --border-color: #1f2937;
    --shadow-soft: 0 2px 10px rgba(0,0,0,0.6);
    --header-bg: #020617;
}

body{
    background:var(--bg-color);
    min-height:100vh;
    color:var(--text-color);
    font-size:15px;
    line-height:1.5;
}

/* HEADER */
header{
    background:var(--header-bg);
    padding:10px 20px;
    box-shadow:0 8px 24px rgba(15,23,42,0.08);
    border-bottom:1px solid rgba(148,163,184,0.25);
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:sticky;
    top:0;
    z-index:10;
    backdrop-filter:blur(10px);
}

/* Brand text */
.header-brand{
    display:flex;
    flex-direction:column;
    gap:2px;
}

.brand-title{
    font-size:19px;
    font-weight:600;
    letter-spacing:0.04em;
    color:var(--heading-color);
}

.brand-subtitle{
    font-size:12px;
    color:var(--text-color);
    opacity:0.9;
}

/* Right header area (theme + profile) */
.header-right{
    display:flex;
    align-items:center;
    gap:12px;
}

/* Theme toggle switch */
.theme-switch{
    position:relative;
    width:46px;
    height:24px;
}

.theme-switch input{
    display:none;
}

.theme-slider{
    position:absolute;
    cursor:pointer;
    inset:0;
    background:#e5e7eb;
    border-radius:999px;
    transition:.3s;
}

.theme-slider:before{
    content:"";
    position:absolute;
    height:18px;
    width:18px;
    border-radius:50%;
    left:3px;
    top:3px;
    background:#ffffff;
    transition:.3s;
}

/* checked state */
.theme-switch input:checked + .theme-slider{
    background:linear-gradient(135deg,#4b3cff,#22c55e);
}

.theme-switch input:checked + .theme-slider:before{
    transform:translateX(22px);
}

/* Profile icon */
.profile-icon{
    width:36px;
    height:36px;
    border-radius:999px;
    background:linear-gradient(135deg,#4b3cff,#6366f1);
    color:#ffffff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:16px;
    cursor:pointer;
    box-shadow:0 10px 24px rgba(79,70,229,0.55);
}

/* Profile dropdown */
.profile-menu{
    position:fixed;
    top:56px;
    right:12px;
    background:var(--card-bg);
    color:var(--text-color);
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    padding:12px 14px;
    width:220px;
    display:none;
    z-index:40;
}

.profile-menu h4{
    margin-bottom:6px;
    font-size:14px;
    color:var(--heading-color);
}

.profile-menu label{
    display:block;
    font-size:12px;
    margin-top:4px;
    margin-bottom:2px;
}

.profile-menu input{
    width:100%;
    padding:6px 8px;
    border-radius:8px;
    border:1px solid var(--border-color);
    background:var(--bg-color);
    color:var(--text-color);
    font-size:13px;
}

.profile-menu button{
    margin-top:8px;
    width:100%;
    padding:7px 10px;
    border:none;
    border-radius:999px;
    cursor:pointer;
    font-size:13px;
}

.btn-save-profile{
    background:#4b3cff;
    color:white;
    margin-bottom:4px;
}

.btn-logout{
    background:#e11d48;
    color:white;
}

.btn-delete-profile{
    background:#6b7280;
    color:white;
    margin-top:4px;
}

/* NAV BAR BELOW HEADER */
.navbar{
    background:transparent;
    display:flex;
    justify-content:center;
    gap:10px;
    padding:14px 0 6px;
}

.nav-link{
    padding:7px 18px;
    border-radius:999px;
    cursor:pointer;
    font-size:14px;
    color:#6b7280;
    border:1px solid transparent;
    background:rgba(148,163,184,0.06);
    transition:background 0.2s ease, color 0.2s ease, transform 0.1s ease, box-shadow 0.2s ease;
}

.nav-link:hover{
    background:rgba(148,163,184,0.15);
    transform:translateY(-1px);
}

body.dark .nav-link{
    color:#e5e7eb;
    background:rgba(31,41,55,0.9);
}

.nav-link.active{
    background:#4b3cff;
    color:white;
    border-color:#4b3cff;
    box-shadow:0 8px 18px rgba(79,70,229,0.35);
}

/* CONTENT */
.content{
    padding:24px 18px;
    max-width:1000px;
    margin:0 auto 40px auto;
    color:var(--text-color);
}

/* Section header row */
.section-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:14px;
}

.section-header h2{
    font-size:20px;
    color:var(--heading-color);
}

/* Add button */
.add-btn{
    border:none;
    background:linear-gradient(135deg,#4b3cff,#6366f1);
    color:white;
    border-radius:999px;
    width:36px;
    height:36px;
    font-size:20px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 10px 25px rgba(79,70,229,0.35);
    transition:transform 0.12s ease, box-shadow 0.12s ease;
}

.add-btn:hover{
    transform:translateY(-1px) scale(1.03);
    box-shadow:0 14px 32px rgba(79,70,229,0.45);
}

/* Simple card list */
.item-list{
    display:flex;
    flex-direction:column;
    gap:12px;
}

/* Cards */
.doc-card,
.video-card,
.tutor-card{
    background:var(--card-bg);
    border-radius:16px;
    padding:14px 16px;
    box-shadow:0 10px 30px rgba(15,23,42,0.06);
    border:1px solid rgba(148,163,184,0.25);
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:12px;
    transition:transform 0.12s ease, box-shadow 0.12s ease, border-color 0.12s ease;
}

.doc-card:hover,
.video-card:hover,
.tutor-card:hover{
    transform:translateY(-2px);
    box-shadow:0 16px 40px rgba(15,23,42,0.12);
    border-color:rgba(129,140,248,0.8);
}

/* Left text */
.card-main{
    flex:1;
}

.card-main > div:first-child{
    margin-bottom:4px;
}

/* Buttons on right */
.card-actions{
    display:flex;
    flex-direction:column;
    gap:4px;
}

.btn-small{
    padding:7px 11px;
    border:none;
    border-radius:999px;
    font-size:12px;
    cursor:pointer;
    color:white;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:4px;
    transition:background 0.15s ease, transform 0.08s ease, box-shadow 0.15s ease;
}

.btn-small:hover{
    transform:translateY(-1px);
    box-shadow:0 6px 14px rgba(15,23,42,0.18);
}

.btn-edit{
    background:#4b3cff;
}

.btn-delete{
    background:#e11d48;
}

/* Video style like YouTube (simple) */
.video-thumb{
    width:140px;
    height:80px;
    background:#e5e7eb;
    border-radius:8px;
    object-fit:cover;
}

/* Simple form (modal-like) */
.form-overlay{
    position:fixed;
    inset:0;
    background:rgba(15,23,42,0.45);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:50;
}

.form-card{
    background:var(--card-bg);
    padding:20px 18px;
    border-radius:18px;
    width:360px;
    max-width:92%;
    box-shadow:0 20px 55px rgba(15,23,42,0.55);
    color:var(--text-color);
    border:1px solid rgba(148,163,184,0.35);
}

.form-card h3{
    margin-bottom:12px;
    font-size:18px;
    color:var(--heading-color);
}

.form-card label{
    display:block;
    font-size:13px;
    margin-top:8px;
    margin-bottom:4px;
}

.form-card input{
    width:100%;
    padding:9px 11px;
    border-radius:10px;
    border:1px solid var(--border-color);
    margin-bottom:4px;
    background:var(--bg-color);
    color:var(--text-color);
    font-size:14px;
}

.form-actions{
    margin-top:12px;
    display:flex;
    gap:8px;
    justify-content:flex-end;
}

.form-actions button{
    width:auto;
    padding:8px 12px;
    border-radius:10px;
}
</style>
</head>
<body>

<header>
    <div class="header-brand">
        <div class="brand-title">🤝 SKILLBARTER</div>
        <div class="brand-subtitle">A place where you can barter your skills easily.</div>
    </div>

    <div class="header-right">
        <!-- Theme toggle -->
        <label class="theme-switch">
            <input type="checkbox" id="themeToggle">
            <span class="theme-slider"></span>
        </label>

        <!-- Profile icon -->
        <div class="profile-icon" id="profileIcon">P</div>
    </div>
</header>

<!-- Profile dropdown -->
<div class="profile-menu" id="profileMenu">
    <h4>Your Profile</h4>
    <label for="profileName">Display Name</label>
    <input type="text" id="profileName" placeholder="Your name">
    <button class="btn-save-profile" onclick="saveProfile()">Save Profile</button>
    <button class="btn-logout" onclick="logout()">Logout</button>
    <button class="btn-delete-profile" onclick="deleteMyProfile()">Delete My Profile</button>
</div>

<!-- Nav bar: Tutors first -->
<div class="navbar">
    <div class="nav-link active" id="navTutors" onclick="showSection('tutors')">Tutors</div>
    <div class="nav-link" id="navDocuments" onclick="showSection('documents')">Documents</div>
    <div class="nav-link" id="navVideos" onclick="showSection('videos')">Videos</div>
</div>

<div class="content">
    <div id="sectionContainer"></div>
</div>

<!-- Form overlay (reused) -->
<div class="form-overlay" id="formOverlay">
  <div class="form-card" id="formCard">
    <!-- filled dynamically -->
  </div>
</div>

<script>
// ===== Auth guard =====
auth.onAuthStateChanged(user => {
    if (!user) {
        window.location.href = "index.html";
    } else {
        showSection('tutors');
        initProfile(user);
    }
});

function logout(){
    auth.signOut().then(() => {
        window.location.href = "index.html";
    });
}

/* ========= Profile UI ========= */
const profileIcon = document.getElementById('profileIcon');
const profileMenu = document.getElementById('profileMenu');
const profileNameInput = document.getElementById('profileName');

function initProfile(user){
    const name = user.displayName || (user.email ? user.email.split('@')[0] : 'U');
    profileIcon.textContent = name.charAt(0).toUpperCase();
    profileNameInput.value = user.displayName || '';
}

profileIcon.addEventListener('click', () => {
    const isVisible = profileMenu.style.display === 'block';
    profileMenu.style.display = isVisible ? 'none' : 'block';
});

document.addEventListener('click', (e) => {
    if (!profileMenu.contains(e.target) && !profileIcon.contains(e.target)) {
        profileMenu.style.display = 'none';
    }
});

function saveProfile(){
    const user = auth.currentUser;
    if (!user) {
        alert('No user logged in.');
        return;
    }
    const newName = profileNameInput.value.trim();
    user.updateProfile({ displayName: newName })
      .then(() => {
        alert('Profile updated.');
        initProfile(user);
      })
      .catch(err => alert('Error updating profile: ' + err.message));
}

function deleteMyProfile(){
    const user = auth.currentUser;
    if (!user) {
        alert('No user logged in.');
        return;
    }
    if (!confirm('Are you sure? This will permanently delete your account and you will need to register again.')) {
        return;
    }
    user.delete()
      .then(() => {
        alert('Your profile has been deleted.');
        window.location.href = 'index.html';
      })
      .catch(err => {
        if (err.code === 'auth/requires-recent-login') {
            alert('For security, please log in again and then delete your profile.');
            logout();
        } else {
            alert('Error deleting profile: ' + err.message);
        }
      });
}

/* ========= Theme toggle ========= */
const themeToggle = document.getElementById('themeToggle');

if (localStorage.getItem('theme') === 'dark') {
    document.body.classList.add('dark');
    themeToggle.checked = true;
}

themeToggle.addEventListener('change', () => {
    if (themeToggle.checked) {
        document.body.classList.add('dark');
        localStorage.setItem('theme', 'dark');
    } else {
        document.body.classList.remove('dark');
        localStorage.setItem('theme', 'light');
    }
});

/* ========= WhatsApp helpers ========= */

function formatPhoneForWhatsApp(localPhone) {
    if (!localPhone) return "";
    let cleaned = localPhone.replace(/\D/g, "");
    if (cleaned.startsWith("0")) {
        cleaned = cleaned.substring(1);
    }
    const countryCode = "91";
    return countryCode + cleaned;
}

function buildTutorWhatsAppLink(phone, tutorName) {
    const fullPhone = formatPhoneForWhatsApp(phone);
    if (!fullPhone) return "";
    const msg = `Hi ${tutorName || ''}, I found you on SkillBarter and would like to barter my skills for your tutoring.`;
    const encoded = encodeURIComponent(msg);
    return `https://wa.me/${fullPhone}?text=${encoded}`;
}

function messageTutor(phone, tutorName) {
    const url = buildTutorWhatsAppLink(phone, tutorName);
    if (!url) {
        alert("No valid WhatsApp number found for this tutor.");
        return;
    }
    window.open(url, "_blank");
}

/* ========= NAV SECTION SWITCH ========= */

let currentSection = 'tutors';
let unsubscribeDocuments = null;
let unsubscribeVideos = null;
let unsubscribeTutors = null;

function setActiveNav(section){
    document.getElementById('navDocuments').classList.remove('active');
    document.getElementById('navVideos').classList.remove('active');
    document.getElementById('navTutors').classList.remove('active');

    if (section === 'documents') {
        document.getElementById('navDocuments').classList.add('active');
    } else if (section === 'videos') {
        document.getElementById('navVideos').classList.add('active');
    } else if (section === 'tutors') {
        document.getElementById('navTutors').classList.add('active');
    }
}

function showSection(section){
    currentSection = section;
    setActiveNav(section);

    const container = document.getElementById('sectionContainer');

    if (unsubscribeDocuments) { unsubscribeDocuments(); unsubscribeDocuments = null; }
    if (unsubscribeVideos) { unsubscribeVideos(); unsubscribeVideos = null; }
    if (unsubscribeTutors) { unsubscribeTutors(); unsubscribeTutors = null; }

    if (section === 'documents') {
        container.innerHTML = `
          <div class="section-header">
            <h2>Documents</h2>
            <button class="add-btn" onclick="openDocumentForm()">+</button>
          </div>
          <div id="documentsList" class="item-list"></div>
        `;
        listenDocuments();
    } else if (section === 'videos') {
        container.innerHTML = `
          <div class="section-header">
            <h2>Videos</h2>
            <button class="add-btn" onclick="openVideoForm()">+</button>
          </div>
          <div id="videosList" class="item-list"></div>
        `;
        listenVideos();
    } else if (section === 'tutors') {
        container.innerHTML = `
          <div class="section-header">
            <h2>Tutors</h2>
            <button class="add-btn" onclick="openTutorForm()">+</button>
          </div>
          <div id="tutorsList" class="item-list"></div>
        `;
        listenTutors();
    }
}

/* ========= FORM OVERLAY HELPERS ========= */

function closeForm() {
    document.getElementById('formOverlay').style.display = 'none';
    document.getElementById('formCard').innerHTML = '';
}

/* ========= DOCUMENTS CRUD ========= */

function listenDocuments(){
    unsubscribeDocuments = db.collection('documents')
      .orderBy('createdAt', 'desc')
      .onSnapshot(snapshot => {
        const user = auth.currentUser;
        const uid = user ? user.uid : null;
        let html = '';

        snapshot.forEach(doc => {
          const d = doc.data();
          const isOwner = uid && uid === d.userId;

          html += `
            <div class="doc-card">
              <div class="card-main">
                <div><strong>${d.name || 'Untitled document'}</strong></div>
                <div style="font-size:12px; color:#6b7280;">${d.url ? d.url : ''}</div>
              </div>
              <div class="card-actions">
                ${d.url ? `<button class="btn-small" style="background:#10b981;" onclick="window.open('${d.url}','_blank')">Open</button>` : ''}
                ${isOwner ? `
                  <button class="btn-small btn-edit" onclick="openDocumentForm('${doc.id}', '${(d.name || '').replace(/'/g, "\\'")}', '${(d.url || '').replace(/'/g, "\\'")}')">Update</button>
                  <button class="btn-small btn-delete" onclick="deleteDocument('${doc.id}', '${d.userId}')">Delete</button>
                ` : ''}
              </div>
            </div>
          `;
        });

        if (!html) {
          html = `<p style="font-size:13px; color:#6b7280;">No documents yet. Click + to upload one.</p>`;
        }

        document.getElementById('documentsList').innerHTML = html;
      });
}

function openDocumentForm(docId = null, name = '', url = '') {
  const card = document.getElementById('formCard');
  card.innerHTML = `
    <h3>${docId ? 'Update Document' : 'Add Document'}</h3>
    <label>Document Name</label>
    <input type="text" id="docNameInput" value="${name}">
    <label>Document URL (e.g. Google Drive link)</label>
    <input type="text" id="docUrlInput" value="${url}">
    <div class="form-actions">
      <button onclick="closeForm()">Cancel</button>
      <button onclick="saveDocument('${docId || ''}')">${docId ? 'Update' : 'Save'}</button>
    </div>
  `;
  document.getElementById('formOverlay').style.display = 'flex';
}

function saveDocument(docId) {
  const name = document.getElementById('docNameInput').value.trim();
  const url  = document.getElementById('docUrlInput').value.trim();
  const user = auth.currentUser;

  if (!user) {
    alert('Please login again.');
    return;
  }
  if (!name) {
    alert('Please enter document name.');
    return;
  }

  const data = {
    name,
    url,
    userId: user.uid,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };

  if (docId) {
    db.collection('documents').doc(docId).update(data)
      .then(() => closeForm())
      .catch(err => alert('Error updating document: ' + err.message));
  } else {
    data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
    db.collection('documents').add(data)
      .then(() => closeForm())
      .catch(err => alert('Error adding document: ' + err.message));
  }
}

function deleteDocument(docId, ownerId) {
  const user = auth.currentUser;
  if (!user || user.uid !== ownerId) {
    alert('You can only delete your own documents.');
    return;
  }
  if (!confirm('Delete this document?')) return;

  db.collection('documents').doc(docId).delete()
    .catch(err => alert('Error deleting document: ' + err.message));
}

/* ========= VIDEOS CRUD ========= */

function listenVideos(){
    unsubscribeVideos = db.collection('videos')
      .orderBy('createdAt', 'desc')
      .onSnapshot(snapshot => {
        const user = auth.currentUser;
        const uid = user ? user.uid : null;
        let html = '';

        snapshot.forEach(doc => {
          const v = doc.data();
          const isOwner = uid && uid === v.userId;
          const thumb = v.thumbnailUrl || '';
          const title = v.title || 'Untitled video';
          const safeTitle = title.replace(/'/g, "\\'");
          const safeThumb = (thumb || '').replace(/'/g, "\\'");
          const safeUrl   = (v.videoUrl || '').replace(/'/g, "\\'");

          html += `
            <div class="video-card">
              <div class="card-main" style="display:flex; gap:10px;">
                ${thumb ? `<img src="${thumb}" class="video-thumb">` : `<div class="video-thumb"></div>`}
                <div>
                  <div><strong>${title}</strong></div>
                  <div style="font-size:12px; color:#6b7280;">${v.videoUrl || ''}</div>
                </div>
              </div>
              <div class="card-actions">
                ${v.videoUrl ? `<button class="btn-small" style="background:#10b981;" onclick="window.open('${v.videoUrl}','_blank')">Watch</button>` : ''}
                ${isOwner ? `
                  <button class="btn-small btn-edit" onclick="openVideoForm('${doc.id}', '${safeTitle}', '${safeThumb}', '${safeUrl}')">Update</button>
                  <button class="btn-small btn-delete" onclick="deleteVideo('${doc.id}', '${v.userId}')">Delete</button>
                ` : ''}
              </div>
            </div>
          `;
        });

        if (!html) {
          html = `<p style="font-size:13px; color:#6b7280;">No videos yet. Click + to upload one.</p>`;
        }

        document.getElementById('videosList').innerHTML = html;
      });
}

function openVideoForm(docId = null, title = '', thumb = '', url = '') {
  const card = document.getElementById('formCard');
  card.innerHTML = `
    <h3>${docId ? 'Update Video' : 'Add Video'}</h3>
    <label>Video Title</label>
    <input type="text" id="videoTitleInput" value="${title}">
    <label>Thumbnail URL (optional)</label>
    <input type="text" id="videoThumbInput" value="${thumb}">
    <label>Video URL (YouTube or Google Drive link)</label>
    <input type="text" id="videoUrlInput" value="${url}" placeholder="Paste YouTube or Drive link">
    <div class="form-actions">
      <button onclick="closeForm()">Cancel</button>
      <button onclick="saveVideo('${docId || ''}')">${docId ? 'Update' : 'Save'}</button>
    </div>
  `;
  document.getElementById('formOverlay').style.display = 'flex';
}

function saveVideo(docId) {
  const title = document.getElementById('videoTitleInput').value.trim();
  const thumb = document.getElementById('videoThumbInput').value.trim();
  const url   = document.getElementById('videoUrlInput').value.trim();
  const user  = auth.currentUser;

  if (!user) {
    alert('Please login again.');
    return;
  }
  if (!title) {
    alert('Please enter video title.');
    return;
  }

  const data = {
    title,
    thumbnailUrl: thumb,
    videoUrl: url,
    userId: user.uid,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };

  if (docId) {
    db.collection('videos').doc(docId).update(data)
      .then(() => closeForm())
      .catch(err => alert('Error updating video: ' + err.message));
  } else {
    data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
    db.collection('videos').add(data)
      .then(() => closeForm())
      .catch(err => alert('Error adding video: ' + err.message));
  }
}

function deleteVideo(docId, ownerId) {
  const user = auth.currentUser;
  if (!user || user.uid !== ownerId) {
    alert('You can only delete your own videos.');
    return;
  }
  if (!confirm('Delete this video?')) return;

  db.collection('videos').doc(docId).delete()
    .catch(err => alert('Error deleting video: ' + err.message));
}

/* ========= TUTORS CRUD ========= */

function listenTutors(){
    unsubscribeTutors = db.collection('tutors')
      .orderBy('createdAt', 'desc')
      .onSnapshot(snapshot => {
        const user = auth.currentUser;
        const uid = user ? user.uid : null;
        let html = '';

        snapshot.forEach(doc => {
          const t = doc.data();
          const isOwner = uid && uid === t.userId;
          const name = t.name || 'Unnamed tutor';
          const spec = t.specialization || '';
          const phone = t.phone || '';
          const safeName = name.replace(/'/g, "\\'");
          const safeSpec = spec.replace(/'/g, "\\'");

          html += `
            <div class="tutor-card">
              <div class="card-main">
                <div><strong>${name}</strong></div>
                <div style="font-size:13px; color:#4b5563;">${spec}</div>
                ${phone ? `<div style="font-size:12px; color:#6b7280;">WhatsApp: ${phone}</div>` : ''}
              </div>
              <div class="card-actions">
                ${phone ? `
                  <button class="btn-small" style="background:#10b981;"
                          onclick="messageTutor('${phone}', '${safeName}')">
                    Message
                  </button>` : ''}
                ${isOwner ? `
                  <button class="btn-small btn-edit" onclick="openTutorForm('${doc.id}', '${safeName}', '${safeSpec}', '${phone}')">Update</button>
                  <button class="btn-small btn-delete" onclick="deleteTutor('${doc.id}', '${t.userId}')">Delete</button>
                ` : ''}
              </div>
            </div>
          `;
        });

        if (!html) {
          html = `<p style="font-size:13px; color:#6b7280;">No tutors yet. Click + to add yourself as a tutor.</p>`;
        }

        document.getElementById('tutorsList').innerHTML = html;
      });
}

function openTutorForm(docId = null, name = '', specialization = '', phone = '') {
  const card = document.getElementById('formCard');
  card.innerHTML = `
    <h3>${docId ? 'Update Tutor' : 'Add Tutor'}</h3>
    <label>Your Name</label>
    <input type="text" id="tutorNameInput" value="${name}">
    <label>Specialized Course / Field</label>
    <input type="text" id="tutorSpecInput" value="${specialization}">
    <label>WhatsApp Number</label>
    <input type="text" id="tutorPhoneInput" value="${phone}" placeholder="e.g. 9876543210">
    <div class="form-actions">
      <button onclick="closeForm()">Cancel</button>
      <button onclick="saveTutor('${docId || ''}')">${docId ? 'Update' : 'Save'}</button>
    </div>
  `;
  document.getElementById('formOverlay').style.display = 'flex';
}

function saveTutor(docId) {
  const name = document.getElementById('tutorNameInput').value.trim();
  const spec = document.getElementById('tutorSpecInput').value.trim();
  const phone = document.getElementById('tutorPhoneInput').value.trim();
  const user = auth.currentUser;

  if (!user) {
    alert('Please login again.');
    return;
  }
  if (!name || !spec || !phone) {
    alert('Please fill all fields including WhatsApp number.');
    return;
  }

  const data = {
    name,
    specialization: spec,
    phone,
    userId: user.uid,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };

  if (docId) {
    db.collection('tutors').doc(docId).update(data)
      .then(() => closeForm())
      .catch(err => alert('Error updating tutor: ' + err.message));
  } else {
    data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
    db.collection('tutors').add(data)
      .then(() => closeForm())
      .catch(err => alert('Error adding tutor: ' + err.message));
  }
}

function deleteTutor(docId, ownerId) {
  const user = auth.currentUser;
  if (!user || user.uid !== ownerId) {
    alert('You can only delete your own tutor profile.');
    return;
  }
  if (!confirm('Delete this tutor entry?')) return;

  db.collection('tutors').doc(docId).delete()
    .catch(err => alert('Error deleting tutor: ' + err.message));
}
